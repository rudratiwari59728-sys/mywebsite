<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My 50 Photo Gallery</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

html, body{
  height:100%;
}

/* FIXED BACKGROUND */
body{
  color:white;
  text-align:center;

  background: linear-gradient(45deg, #ff512f, #dd2476, #1e90ff, #00c9a7);
  background-size:400% 400%;
  animation:bgMove 10s infinite alternate;
}

@keyframes bgMove{
  0%{background-position:0% 50%;}
  100%{background-position:100% 50%;}
}

h1{
  padding:20px;
  font-size:40px;
}

/* Gallery */
.gallery{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap:15px;
  padding:20px;
}

.gallery img{
  width:100%;
  border-radius:10px;
  cursor:pointer;
  transition:0.4s;
}

.gallery img:hover{
  transform:scale(1.1);
  box-shadow:0 0 20px black;
}

/* Lightbox */
#lightbox{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
}

#lightbox img{
  width:70%;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>special moments</h1>

<div class="gallery" id="gallery"></div>

<!-- Lightbox -->
<div id="lightbox" onclick="closeImg()">
  <img id="lightbox-img">
</div>

<script>

/* Load 50 Images */
let gallery = document.getElementById("gallery");

for(let i=1;i<=50;i++){
  let img = document.createElement("img");
  img.src = i + ".jpg";   // 👈 1.jpg to 50.jpg

  img.onclick = function(){
    openImg(this.src);
  }

  gallery.appendChild(img);
}

/* Lightbox */
function openImg(src){
  document.getElementById("lightbox").style.display="flex";
  document.getElementById("lightbox-img").src=src;
}

function closeImg(){
  document.getElementById("lightbox").style.display="none";
}

</script>

</body>
</html>
