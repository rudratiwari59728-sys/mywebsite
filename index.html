<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rudra Tiwari | Tech Showcase</title>
    <style>
        /* Modern Pro Styling */
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(79, 172, 254, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 242, 254, 0.15) 0px, transparent 50%);
            color: #f8fafc;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Animated Navbar */
        nav {
            padding: 20px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            position: sticky; top: 0; z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo { 
            font-size: 1.5rem; font-weight: 800; 
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        nav ul { display: flex; list-style: none; gap: 30px; }
        nav ul li a { 
            text-decoration: none; color: #94a3b8; font-weight: 500; 
            transition: 0.3s; font-size: 0.9rem;
        }
        nav ul li a:hover { color: var(--primary); text-shadow: 0 0 10px var(--primary); }

        /* Hero Section */
        .hero {
            height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .main-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            padding: 60px 40px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 800px;
            width: 100%;
            animation: slideUp 1s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: clamp(2rem, 8vw, 4rem);
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 20px;
        }

        .highlight { color: var(--primary); text-shadow: 0 0 20px rgba(0, 242, 254, 0.4); }

        p { color: #94a3b8; font-size: 1.1rem; max-width: 500px; margin: 0 auto 30px; }

        /* Action Buttons */
        .btn-group { display: flex; gap: 15px; justify-content: center; }

        .btn {
            padding: 12px 30px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.4s;
            font-size: 0.9rem;
        }

        .btn-primary {
            background: var(--primary);
            color: #0f172a;
            box-shadow: 0 10px 20px -5px rgba(0, 242, 254, 0.4);
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 15px 25px -5px rgba(0, 242, 254, 0.6); }

        .btn-secondary {
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
        }
        .btn-secondary:hover { background: rgba(255,255,255,0.05); }

        /* Skill Pills */
        .skills {
            display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 40px;
        }
        .pill {
            padding: 5px 15px; background: rgba(255,255,255,0.05);
            border-radius: 100px; font-size: 0.75rem; color: var(--secondary);
            border: 1px solid rgba(79, 172, 254, 0.3);
        }

        footer { padding: 40px; text-align: center; color: #475569; font-size: 0.8rem; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">RT.DEV</div>
        <ul>
            <li><a href="#">Works</a></li>
            <li><a href="#">Skills</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <section class="hero">
        <div class="main-card">
            <h1>Building the <span class="highlight">Future</span> of Web.</h1>
            <p>I'm Rudra Tiwari, a BCA student crafting high-performance digital experiences.</p>
            
            <div class="btn-group">
                <a href="https://instagram.com/rudratiwaris" class="btn btn-primary">Let's Connect</a>
                <a href="#" class="btn btn-secondary">View Projects</a>
            </div>

            <div class="skills">
                <span class="pill">HTML5</span>
                <span class="pill">CSS3</span>
                <span class="pill">JavaScript</span>
                <span class="pill">C++</span>
                <span class="pill">UI/UX</span>
            </div>
        </div>
    </section>

    <footer>
        Designed & Developed by Rudra Tiwari &copy; 2026
    </footer>

</body>
</html>
