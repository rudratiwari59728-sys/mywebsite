<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RT Shop | Smart Search</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Segoe UI', sans-serif; }
        .meesho-pink { color: #f43397; }
        .bg-meesho { background-color: #f43397; }
        .product-card { transition: 0.3s; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <nav class="bg-white shadow-sm sticky top-0 z-50 p-4">
        <div class="max-w-7xl mx-auto flex flex-wrap justify-between items-center gap-4">
            <h1 class="text-3xl font-bold meesho-pink cursor-pointer" onclick="location.reload()">RT Shop</h1>
            
            <div class="flex-1 max-w-xl relative">
                <input type="text" id="searchInput" onkeyup="searchProducts()" placeholder="Search 'Shoes', 'Watch', 'Phone'..." 
                class="w-full border border-gray-300 rounded-md py-2 px-10 outline-none focus:border-pink-500 text-gray-700">
                <i class="fa fa-search absolute left-3 top-3 text-gray-400"></i>
            </div>

            <div class="flex gap-6 text-gray-600">
                <div class="text-center cursor-pointer hover:meesho-pink"><i class="fa fa-user"></i><p class="text-[10px]">Profile</p></div>
                <div class="text-center cursor-pointer hover:meesho-pink"><i class="fa fa-shopping-cart"></i><p class="text-[10px]">Cart</p></div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        <h2 class="text-xl font-bold text-gray-800 mb-6 border-l-4 border-pink-500 pl-3">Exclusive Collection</h2>
        
        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6" id="productGrid">
            
            <div class="bg-white rounded-lg border product-card p-2" data-name="shoes sports red sneakers">
                <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400" class="h-40 w-full object-cover rounded">
                <div class="p-2">
                    <p class="text-gray-600 text-sm font-semibold truncate">Men's Red Sports Shoes</p>
                    <p class="text-xl font-bold mt-1">₹899</p>
                    <p class="text-green-600 text-[10px] font-bold mt-1">Free Delivery</p>
                </div>
            </div>

            <div class="bg-white rounded-lg border product-card p-2" data-name="watch black analog premium">
                <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400" class="h-40 w-full object-cover rounded">
                <div class="p-2">
                    <p class="text-gray-600 text-sm font-semibold truncate">Premium Black Watch</p>
                    <p class="text-xl font-bold mt-1">₹1,249</p>
                    <p class="text-pink-500 text-[10px] font-bold mt-1">Special Offer</p>
                </div>
            </div>

            <div class="bg-white rounded-lg border product-card p-2" data-name="phone smartphone mobile electronics">
                <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=400" class="h-40 w-full object-cover rounded">
                <div class="p-2">
                    <p class="text-gray-600 text-sm font-semibold truncate">RT Smart Phone X1</p>
                    <p class="text-xl font-bold mt-1">₹14,999</p>
                    <p class="text-blue-500 text-[10px] font-bold mt-1">New Arrival</p>
                </div>
            </div>

            <div class="bg-white rounded-lg border product-card p-2" data-name="headphones music audio wireless">
                <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400" class="h-40 w-full object-cover rounded">
                <div class="p-2">
                    <p class="text-gray-600 text-sm font-semibold truncate">Wireless Headphones</p>
                    <p class="text-xl font-bold mt-1">₹2,499</p>
                    <p class="text-green-600 text-[10px] font-bold mt-1">5-Star Rated</p>
                </div>
            </div>

        </div>

        <div id="noResult" class="hidden text-center py-20">
            <i class="fa fa-box-open text-5xl text-gray-300 mb-4"></i>
            <p class="text-gray-500">Opps! Hume ye nahi mila. Kuch aur search karke dekho.</p>
        </div>
    </main>

    <script>
        function searchProducts() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('product-card');
            let grid = document.getElementById('productGrid');
            let noResult = document.getElementById('noResult');
            let found = false;

            for (let i = 0; i < cards.length; i++) {
                let name = cards[i].getAttribute('data-name');
                if (name.includes(input)) {
                    cards[i].style.display = "";
                    found = true;
                } else {
                    cards[i].style.display = "none";
                }
            }

            if(found) {
                noResult.classList.add('hidden');
            } else {
                noResult.classList.remove('hidden');
            }
        }
    </script>

</body>
</html>
