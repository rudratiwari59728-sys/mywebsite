<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Intro</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  overflow:hidden;
}

/* Animated Background */
body::before{
  content:"";
  position:absolute;
  width:200%;
  height:200%;
  background: linear-gradient(45deg, #ff416c, #ff4b2b, #1e90ff, #00c9a7);
  background-size: 400% 400%;
  animation: moveBg 10s infinite alternate;
  z-index:-1;
}

@keyframes moveBg{
  0%{background-position:0% 50%;}
  100%{background-position:100% 50%;}
}

/* Card */
.container{
  text-align:center;
  background: rgba(0,0,0,0.5);
  padding:40px;
  border-radius:20px;
  backdrop-filter: blur(10px);
  animation: fadeIn 1.5s ease;
}

/* Image */
.container img{
  width:150px;
  height:150px;
  border-radius:50%;
  border:4px solid white;
  margin-bottom:20px;
  transition:0.4s;
}

.container img:hover{
  transform: scale(1.1) rotate(5deg);
}

/* Text */
h1{
  font-size:35px;
}

p{
  margin-top:10px;
  font-size:18px;
  opacity:0.8;
}

/* Button */
button{
  margin-top:20px;
  padding:10px 20px;
  border:none;
  border-radius:25px;
  background:#ff4b2b;
  color:white;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#ff416c;
  transform:scale(1.1);
}

/* Animation */
@keyframes fadeIn{
  from{opacity:0; transform:translateY(30px);}
  to{opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="container">
  <img src="https://picsum.photos/200" alt="profile">

  <h1>Hello, I'm Rudra 👋</h1>
  <p>Beginner Web Developer | Learning HTML, CSS & JS</p>

  <button onclick="showMsg()">Click Me</button>
</div>

<script>
function showMsg(){
  alert("Welcome to my website bhai 🔥");
}
</script>

</body>
</html>
